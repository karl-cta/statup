services:
  statup:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - statup_data:/data
    environment:
      - DATABASE_URL=/data/statup.db
      - HOST=0.0.0.0
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_EXPIRY=${SESSION_EXPIRY:-604800}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RUST_LOG=${RUST_LOG:-statup=info,tower_http=info}
      - PUBLIC_MODE=${PUBLIC_MODE:-false}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  statup_data:

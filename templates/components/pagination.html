{# Pagination, expects `page` (i64), `has_next` (bool), `base_url` (String) in scope #}
<nav class="mt-8 flex items-center justify-between" aria-label="Pagination">
    {% if page > 1 %}
    <a href="{{ base_url }}page={{ page - 1 }}" class="btn-3d-ghost text-sm !px-3 !py-2" aria-label="Previous page">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
        {{ i18n.t("common.previous") }}
    </a>
    {% else %}
    <span></span>
    {% endif %}

    <span role="status" class="rounded-sm font-mono px-2.5 py-0.5 text-[12px] font-medium tabular-nums text-ink/55 border border-ink/15 dark:text-sand-light/55 dark:border-sand-light/15">
        {{ i18n.t("common.page") }} {{ page }}
    </span>

    {% if has_next %}
    <a href="{{ base_url }}page={{ page + 1 }}" class="btn-3d-ghost text-sm !px-3 !py-2" aria-label="Next page">
        {{ i18n.t("common.next") }}
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
    </a>
    {% else %}
    <span></span>
    {% endif %}
</nav>

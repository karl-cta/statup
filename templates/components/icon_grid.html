{# Custom icons grid for the picker. Expects `custom_icons` (Vec<Icon>), `selected_icon_id` (Option<i64>), `i18n` (I18n) in scope. #}
<div id="custom-icons-grid" class="mt-3">
    {% if custom_icons.is_empty() %}
    <p class="text-[12px] text-ink/45 dark:text-sand-light/40">
        {{ i18n.t("icons.no_custom") }}
    </p>
    {% else %}
    <div class="grid grid-cols-6 gap-1.5 sm:grid-cols-8">
        {% for icon in custom_icons %}
        <button type="button"
                data-icon-id="{{ icon.id }}"
                data-icon-url="{{ icon.url() }}"
                onclick="selectCustomIcon(this)"
                class="icon-btn-custom group flex h-11 w-11 items-center justify-center rounded-sm border transition-colors cursor-pointer
                       {% if let Some(sel) = selected_icon_id %}{% if sel.eq(icon.id) %}border-ink bg-sand-warm dark:border-sand-light dark:bg-surface-2{% else %}border-ink/10 bg-cream hover:border-ink/25 hover:bg-sand-warm dark:border-sand-light/10 dark:bg-surface-1 dark:hover:border-sand-light/20 dark:hover:bg-surface-2{% endif %}{% else %}border-ink/10 bg-cream hover:border-ink/25 hover:bg-sand-warm dark:border-sand-light/10 dark:bg-surface-1 dark:hover:border-sand-light/20 dark:hover:bg-surface-2{% endif %}"
                title="{{ icon.original_name }}"
                aria-label="{{ i18n.t("icons.select") }} {{ icon.original_name }}">
            <img src="{{ icon.url() }}" alt="{{ icon.original_name }}" class="h-6 w-6 rounded-sm object-contain">
        </button>
        {% endfor %}
    </div>
    {% endif %}
</div>

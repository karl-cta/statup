<!DOCTYPE html>
<html lang="{{ i18n.locale() }}" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Statup{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="stylesheet" href="/static/css/style.css?v={{ crate::css_version() }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="htmx-config" content='{"globalViewTransitions":true}'>
    <script src="/static/js/htmx.min.js"></script>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body class="h-full bg-page dark:bg-ink text-ink dark:text-sand-light antialiased noise">
    {% block body %}{% endblock %}
    <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
        var meta = document.querySelector('meta[name="csrf-token"]');
        if (meta) { evt.detail.headers['X-CSRF-Token'] = meta.content; }
    });
    function toggleTheme() {
        var d = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', d ? 'dark' : 'light');
    }
    function switchLang() {
        var current = document.documentElement.lang || 'fr';
        var next = current === 'fr' ? 'en' : 'fr';
        document.cookie = 'lang=' + next + ';path=/;max-age=31536000;SameSite=Lax';
        location.reload();
    }
    // Scroll reveal, IntersectionObserver
    (function() {
        if (!('IntersectionObserver' in window)) return;
        var io = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('is-visible');
                    io.unobserve(e.target);
                }
            });
        }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
        function observe() {
            document.querySelectorAll('.reveal:not(.is-visible)').forEach(function(el) { io.observe(el); });
        }
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', observe); } else { observe(); }
        document.body.addEventListener('htmx:afterSwap', observe);
    })();
    </script>
</body>
</html>

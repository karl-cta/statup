<!DOCTYPE html>
<html lang="{{ i18n.locale() }}" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Statup{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="preload" href="/static/fonts/hanken-grotesk-variable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css?v={{ crate::css_version() }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="htmx-config" content='{"globalViewTransitions":true}'>
    <script src="/static/js/htmx.min.js"></script>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body class="h-full bg-page dark:bg-ink text-ink dark:text-sand-light antialiased noise">
    {% block body %}{% endblock %}
    <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
        var meta = document.querySelector('meta[name="csrf-token"]');
        if (meta) { evt.detail.headers['X-CSRF-Token'] = meta.content; }
    });
    function toggleTheme() {
        var d = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', d ? 'dark' : 'light');
    }
    function switchLang() {
        var current = document.documentElement.lang || 'fr';
        var next = current === 'fr' ? 'en' : 'fr';
        document.cookie = 'lang=' + next + ';path=/;max-age=31536000;SameSite=Lax';
        location.reload();
    }
    // Masthead live clock and active nav marker
    (function() {
        var lang = document.documentElement.lang || 'fr';
        var dateEl = document.getElementById('mast-date');
        var clockEl = document.getElementById('mast-clock');
        if (dateEl) {
            try {
                dateEl.textContent = new Date().toLocaleDateString(lang, {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                });
            } catch(e) { dateEl.textContent = new Date().toDateString(); }
        }
        function tickClock() {
            if (!clockEl) return;
            var d = new Date();
            var hh = String(d.getUTCHours()).padStart(2, '0');
            var mm = String(d.getUTCMinutes()).padStart(2, '0');
            clockEl.textContent = hh + ':' + mm + ' UTC';
        }
        tickClock();
        setInterval(tickClock, 30000);

        var path = window.location.pathname;
        var best = null, bestLen = -1;
        document.querySelectorAll('.mnav[data-nav]').forEach(function(a) {
            var p = a.getAttribute('data-nav');
            if (p === '/' && path === '/') {
                if (bestLen < 1) { best = a; bestLen = 1; }
            } else if (p !== '/' && path.indexOf(p) === 0 && p.length > bestLen) {
                best = a; bestLen = p.length;
            }
        });
        if (best) best.classList.add('active');
    })();

    // Drawer, right-side detail pane. Solid panel, transform-only animation.
    // Fetch runs in parallel with the open animation; the swap happens as soon
    // as the response is ready. The drawer is isolated via `contain: layout
    // paint style`, so the swap does not cascade into a dashboard repaint.
    var _drawerReq = 0;
    function openDrawer(url) {
        var overlay = document.getElementById('drawer-overlay');
        var panel = document.getElementById('drawer');
        var content = document.getElementById('drawer-content');
        if (!overlay || !panel || !content) return;
        var reqId = ++_drawerReq;
        content.innerHTML = '<div class="drawer-loader"><div class="drawer-spinner"></div></div>';
        overlay.classList.add('open');
        panel.classList.add('open');
        fetch(url, { headers: { 'HX-Request': 'true' } })
            .then(function(r) { return r.text(); })
            .then(function(html) {
                if (reqId !== _drawerReq) return;
                content.innerHTML = html;
                if (window.htmx) htmx.process(content);
            })
            .catch(function() {
                if (reqId !== _drawerReq) return;
                content.innerHTML = '';
            });
    }
    function closeDrawer() {
        var overlay = document.getElementById('drawer-overlay');
        var panel = document.getElementById('drawer');
        if (!overlay || !panel) return;
        _drawerReq++;
        panel.classList.remove('open');
        overlay.classList.remove('open');
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDrawer();
    });
    // Delegate: any [data-drawer] click opens the drawer with that URL,
    // falling back to the href navigation if JS is disabled.
    document.addEventListener('click', function(e) {
        var el = e.target.closest('[data-drawer]');
        if (!el) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
        e.preventDefault();
        openDrawer(el.getAttribute('data-drawer'));
    });

    // Relative time, elements with data-relative-from="<ISO string>" get
    // their textContent updated every minute ("5 min ago", "hace 2 h", etc.)
    (function() {
        function fmtRelative(iso) {
            var then = Date.parse(iso);
            if (isNaN(then)) return '';
            var lang = document.documentElement.lang || 'fr';
            var rtf;
            try { rtf = new Intl.RelativeTimeFormat(lang, { numeric: 'auto' }); }
            catch (e) { return ''; }
            var diffSec = Math.max(0, Math.round((Date.now() - then) / 1000));
            if (diffSec < 60) return rtf.format(-diffSec, 'second');
            var diffMin = Math.round(diffSec / 60);
            if (diffMin < 60) return rtf.format(-diffMin, 'minute');
            var diffH = Math.round(diffSec / 3600);
            if (diffH < 24) return rtf.format(-diffH, 'hour');
            var diffD = Math.round(diffSec / 86400);
            return rtf.format(-diffD, 'day');
        }
        function updateRelatives() {
            document.querySelectorAll('[data-relative-from]').forEach(function(el) {
                var iso = el.getAttribute('data-relative-from');
                el.textContent = fmtRelative(iso);
            });
        }
        updateRelatives();
        setInterval(updateRelatives, 60000);
        document.body.addEventListener('htmx:afterSwap', updateRelatives);
    })();

    // Scroll reveal, IntersectionObserver. Skips swaps targeted at the drawer.
    (function() {
        if (!('IntersectionObserver' in window)) return;
        var io = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('is-visible');
                    io.unobserve(e.target);
                }
            });
        }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
        function observe() {
            document.querySelectorAll('.reveal:not(.is-visible)').forEach(function(el) { io.observe(el); });
        }
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', observe); } else { observe(); }
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.target && e.target.closest && e.target.closest('#drawer')) return;
            observe();
        });
    })();
    </script>
</body>
</html>

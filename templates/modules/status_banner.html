{# Status banner. Expects: active_incidents, i18n #}
<div class="animate-in">
    {% if active_incidents.is_empty() %}
    <div class="rounded-lg border border-emerald-200 bg-emerald-50/60 px-5 py-4 dark:border-emerald-900/40 dark:bg-emerald-950/20">
        <div class="flex items-center gap-3">
            <span class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-emerald-100 dark:bg-emerald-900/40" aria-hidden="true">
                <svg class="h-4.5 w-4.5 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </span>
            <div>
                <span class="text-[15px] font-bold text-emerald-900 dark:text-emerald-200">{{ i18n.t("dashboard.all_operational") }}</span>
            </div>
        </div>
    </div>
    {% else %}
    <div class="rounded-lg border border-red-200 bg-red-50/60 px-5 py-4 dark:border-red-900/40 dark:bg-red-950/20">
        <div class="flex items-center gap-3 flex-wrap">
            <span class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-red-100 dark:bg-red-900/40" aria-hidden="true">
                <svg class="h-4.5 w-4.5 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
            </span>
            <span class="text-[15px] font-bold text-red-900 dark:text-red-200">{{ active_incidents.len() }} {{ i18n.t("dashboard.active_incidents") }}</span>
            {% for incident in active_incidents %}
            <a onclick="openDrawer('/events/{{ incident.id }}/panel'); return false;"
               href="/events/{{ incident.id }}"
               class="inline-flex items-center gap-1.5 rounded-full border border-red-200 bg-white px-3 py-1 text-[13px] font-semibold text-red-700
                      transition-colors hover:bg-red-50
                      dark:border-red-800 dark:bg-red-950/40 dark:text-red-300 dark:hover:bg-red-900/40">
                <span class="h-1.5 w-1.5 rounded-full bg-red-500 animate-soft-pulse" aria-hidden="true"></span>
                {{ incident.title }}
            </a>
            {% endfor %}
        </div>
    </div>
    {% endif %}
</div>

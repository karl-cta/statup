{# HTMX fragment: icon gallery grid for picker, expects `icons` (Vec<Icon>), `csrf_token` (String) in scope #}
<div class="mt-3 card-raised p-4">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium text-ink dark:text-sand-light">{{ i18n.t("icons.heading") }}</h3>
        <button type="button"
                onclick="document.getElementById('icon-gallery-modal').innerHTML=''"
                class="text-ink/45 hover:text-ink dark:text-sand-light/40 dark:hover:text-sand-light transition-colors"
                aria-label="{{ i18n.t("icons.close") }}">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <form hx-post="/icons/upload" hx-target="#icon-gallery-modal" hx-swap="innerHTML" hx-encoding="multipart/form-data"
          class="mb-4 flex items-center gap-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="file" name="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" required
               class="block w-full text-[13px] text-ink/55 dark:text-sand-light/45 file:mr-2 file:rounded-sm file:border-0
                      file:bg-sand-warm file:px-3 file:py-1.5 file:text-[13px] file:font-medium
                      file:text-ink file:transition-colors hover:file:bg-sand
                      dark:file:bg-surface-2 dark:file:text-sand-light dark:hover:file:bg-surface-3">
        <button type="submit" class="btn-3d text-[13px] !px-3 !py-1.5">
            {{ i18n.t("icons.upload") }}
        </button>
    </form>

    {% if icons.is_empty() %}
    <p class="text-center text-[13px] text-ink/45 dark:text-sand-light/40 py-6">
        {{ i18n.t("icons.no_custom") }}
    </p>
    {% else %}
    <div class="grid grid-cols-6 gap-2 sm:grid-cols-8">
        {% for icon in icons %}
        <button type="button"
                onclick="document.getElementById('icon-id-input').value='{{ icon.id }}'; document.getElementById('icon-preview').innerHTML='<img src=\'{{ icon.url() }}\' alt=\'Icône\' class=\'h-8 w-8 rounded-sm object-contain\'>'; document.getElementById('icon-gallery-modal').innerHTML='';"
                class="group relative flex h-14 w-14 items-center justify-center rounded-sm border border-ink/10 bg-cream
                       transition-colors hover:border-ink/30 hover:bg-sand-warm
                       dark:border-sand-light/10 dark:bg-surface-1 dark:hover:border-sand-light/25 dark:hover:bg-surface-2"
                title="{{ icon.original_name }}"
                aria-label="{{ i18n.t("icons.select") }} {{ icon.original_name }}">
            <img src="{{ icon.url() }}" alt="{{ icon.original_name }}" class="h-8 w-8 rounded-sm object-contain">
        </button>
        {% endfor %}
    </div>
    {% endif %}
</div>

{# HTMX fragment: icon gallery grid for picker, expects `icons` (Vec<Icon>), `csrf_token` (String) in scope #}
<div class="mt-3 card-raised p-4 shadow-lg">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-stone-900 dark:text-white">{{ i18n.t("icons.heading") }}</h3>
        <button
            type="button"
            onclick="document.getElementById('icon-gallery-modal').innerHTML=''"
            class="text-[13px] text-stone-400 hover:text-stone-600 dark:text-stone-500 dark:hover:text-stone-300 transition-colors"
            aria-label="{{ i18n.t("icons.close") }}"
        >
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <form
        hx-post="/icons/upload"
        hx-target="#icon-gallery-modal"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        class="mb-4 flex items-center gap-2"
    >
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input
            type="file"
            name="file"
            accept="image/png,image/jpeg,image/webp,image/svg+xml"
            required
            class="block w-full text-[13px] text-stone-500 file:mr-2 file:rounded-lg file:border-0
                   file:bg-teal-50 file:px-3 file:py-1.5 file:text-[13px] file:font-medium
                   file:text-teal-700 file:transition-colors hover:file:bg-teal-200
                   dark:text-stone-400 dark:file:bg-teal-500/10 dark:file:text-teal-400
                   dark:hover:file:bg-teal-500/20"
        >
        <button
            type="submit"
            class="btn-3d text-[13px] !px-3 !py-1.5"
        >
            {{ i18n.t("icons.upload") }}
        </button>
    </form>

    {% if icons.is_empty() %}
    <p class="text-center text-[13px] text-stone-400 dark:text-stone-500 py-6">
        {{ i18n.t("icons.no_custom") }}
    </p>
    {% else %}
    <div class="grid grid-cols-6 gap-2 sm:grid-cols-8">
        {% for icon in icons %}
        <button
            type="button"
            onclick="document.getElementById('icon-id-input').value='{{ icon.id }}'; document.getElementById('icon-preview').innerHTML='<img src=\'{{ icon.url() }}\' alt=\'Icône\' class=\'h-8 w-8 rounded object-contain\'>'; document.getElementById('icon-gallery-modal').innerHTML='';"
            class="group relative flex h-14 w-14 items-center justify-center rounded-lg border border-stone-200 bg-stone-50
                   transition-colors duration-150 hover:border-teal-600 hover:bg-teal-50
                   dark:border-stone-700 dark:bg-stone-800/60 dark:hover:border-teal-500 dark:hover:bg-teal-500/10"
            title="{{ icon.original_name }}"
            aria-label="{{ i18n.t("icons.select") }} {{ icon.original_name }}"
        >
            <img src="{{ icon.url() }}" alt="{{ icon.original_name }}" class="h-8 w-8 rounded object-contain">
        </button>
        {% endfor %}
    </div>
    {% endif %}
</div>
